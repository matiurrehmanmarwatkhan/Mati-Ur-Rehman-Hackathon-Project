<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forget Password</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="w-full h-screen flex items-center justify-center bg-gray-100">
      <form action="" class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-4xl font-bold mb-4 text-center">Forget Password</h2>
        <div class="mt-3">
          <label for="email" class="block text-sm font-medium text-gray-700"
            >Email :</label
          >
          <input
            type="email"
            name="email"
            id="email"
            required
            class="mt-4 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          />
        </div>
        <div class="mt-4">
          <button
            onclick="submitbtn()"
            type="submit"
            class="w-full mt-4 bg-blue-500 text-white py-2 px-4 rounded-md border-none hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 cursor-pointer"
          >
            Submit
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
