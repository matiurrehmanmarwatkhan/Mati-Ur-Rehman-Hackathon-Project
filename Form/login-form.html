<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="login-form.js" async></script>
  </head>
  <body>
    <div class="w-full h-screen flex items-center justify-center bg-gray-100">
      <form class="bg-white p-8 rounded-lg shadow-md w-96" action="">
        <h2 class="text-4xl font-bold mb-4 text-center">Login</h2>
        <div class="mb-4">
          <label for="username" class="block text-sm font-medium text-gray-700"
            >Username :</label
          >
          <input
            type="text"
            name="username"
            id="username"
            required
            class="mt-2 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          />
          <br />
          <label for="password" class="block text-sm font-medium text-gray-700"
            >Password :</label
          >
          <input
            type="password"
            name="password"
            required
            id="password"
            class="mt-2 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
          />
        </div>
        <div class="mt-4">
          <button
            onclick="submitbtn()"
            type="submit"
            class="w-full mt-4 bg-blue-500 text-white py-2 px-4 rounded-md border-none hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 cursor-pointer"
          >
            Submit
          </button>
        </div>
        <p class="mt-3 text-gray-600 text-sm text-center">
          Forget Password?
          <a
            href="Sign-up/forget-p/forget.html"
            class="text-red-400 text-sm decoration-none hover:underline"
            >Click Here</a
          >
        </p>
        <button
          class="mt-6 bg-green-400 w-full cursor-pointer hover:bg-green-300 border-none focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50 text-white py-1 px-3 rounded-md"
        >
          <a href="Sign-up/sign-up.html" class="text-white p-2 block"
            >Sign Up</a
          >
        </button>
      </form>
    </div>
  </body>
</html>
